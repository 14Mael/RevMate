server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revmate?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${OPENAI_MODEL:qwen3.5-omni-plus}
      embedding:
        enabled: false

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours

# 文件上传存储路径
app:
  upload:
    dir: uploads

# JODConverter + LibreOffice
jodconverter:
  local:
    enabled: true
    max-tasks-per-process: 100
