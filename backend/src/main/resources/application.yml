server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revmate?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    openai:
      api-key: "sk-ws-H.RPDEDDR.1wHd.MEUCIQD1D8m5USMqS7BA-mdlKdxpYkeyjl94508pqKH9suSydgIgOxViHyae7CP0OvZa8iJ3oRhzmX2FltFBb4XNPUUvO3A"
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      chat:
        options:
          model: qwen3.5-omni-plus
      embedding:
        enabled: false

# JWT
jwt:
  secret: ${JWT_SECRET:RevMateDefaultSecretKeyForDevelopmentMustBeAtLeast256BitsLong!!}
  expiration: 86400000  # 24 hours

# 文件上传存储路径
app:
  upload:
    dir: uploads
