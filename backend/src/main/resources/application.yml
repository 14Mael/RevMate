server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revmate?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  ai:
    openai:
      api-key: ${OPENAI_API_KEY}
      base-url: ${OPENAI_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode}
      chat:
        options:
          model: ${OPENAI_MODEL:qwen3.5-omni-plus}
      embedding:
        enabled: ${EMBEDDING_ENABLED:false}
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v4}

app:
  rag:
    embedding:
      enabled: ${EMBEDDING_ENABLED:false}
      model: ${EMBEDDING_MODEL:text-embedding-v4}
  upload:
    dir: uploads

# JWT
jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000  # 24 hours

dashscope:
  api-key: ${DASHSCOPE_API_KEY:${OPENAI_API_KEY:}}
  asr-model: ${DASHSCOPE_ASR_MODEL:paraformer-v2}
  poll-interval: ${DASHSCOPE_ASR_POLL_INTERVAL:PT2S}
  max-poll-attempts: ${DASHSCOPE_ASR_MAX_POLL_ATTEMPTS:300}

aliyun:
  oss:
    endpoint: ${ALIYUN_OSS_ENDPOINT:}
    bucket: ${ALIYUN_OSS_BUCKET:}
    access-key-id: ${ALIYUN_ACCESS_KEY_ID:}
    access-key-secret: ${ALIYUN_ACCESS_KEY_SECRET:}
    signed-url-expire: ${ALIYUN_OSS_SIGNED_URL_EXPIRE:PT1H}

# JODConverter + LibreOffice
jodconverter:
  local:
    enabled: true
    max-tasks-per-process: 100
