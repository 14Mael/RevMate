server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/revmate?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  ai:
    dashscope:
      api-key: ${DASHSCOPE_API_KEY:your-api-key-here}

# JWT
jwt:
  secret: ${JWT_SECRET:RevMateDefaultSecretKeyForDevelopmentMustBeAtLeast256BitsLong!!}
  expiration: 86400000  # 24 hours

# 文件上传存储路径
app:
  upload:
    dir: uploads
